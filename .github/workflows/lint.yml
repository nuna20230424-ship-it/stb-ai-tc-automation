name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tools
        run: pip install ruff==0.7.1 black==24.10.0
      - name: Ruff
        run: ruff check infrastructure tests
      - name: Black (check only)
        run: black --check infrastructure tests

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          dockerfile: infrastructure/**/Dockerfile

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows infrastructure
          config_data: |
            extends: relaxed
            rules:
              line-length: disable
              truthy: disable

  catalog-lint:
    # docs/38 §7 — 신규 시나리오의 비표준 키/네비/precondition을 머지 전 차단
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install schema deps
        run: pip install pydantic==2.9.0
      - name: catalog_tuner lint --strict
        run: python -m tools.catalog_tuner.cli lint --strict
      - name: catalog schema validate
        run: python -m tools.catalog.validate infrastructure/notebook-gateway/data/scenarios-catalog.json

  tools-tests:
    # tools/ 순수 함수 회귀 — 231/231 안전망
    # (catalog_expander/tuner/tc_selector/triage/navgraph/rdk/golden_set/vision_bench/anomaly_injector/console_data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -r tools/requirements.txt
          pip install pytest==8.3.3 httpx==0.27.2 pillow==10.4.0
      - name: pytest tools/tests
        run: python -m pytest tools/tests/ -q
