# Notebook Gateway — STB 직결 제어 스택
#
# 역할: 운영 노트북에서 캡처카드/IR/UART/Power를 직접 제어하고
#       Mac mini 백엔드(AI/DB)에 데이터를 업로드한다.
#
# 호환성 메모:
#   - Linux 노트북 / Windows WSL2: USB device passthrough 그대로 사용 가능 (아래 devices: 블록)
#   - macOS 노트북: Docker Desktop은 USB 디바이스 직접 접근 불가
#     → capture-mcp, uart-mcp는 호스트 네이티브 실행 권장 (services/*/run-native.sh 참조)
#     → ir-mcp, power-mcp는 LAN 기반이라 Docker 그대로 OK
#
# 사용:
#   cp .env.example .env  # 환경값 채우기
#   docker compose up -d
#   docker compose ps

name: stb-gateway

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ────────────────────────────────────────────────────────────
  # 1) Capture MCP — HDMI 캡처카드(UVC) 제어
  # ────────────────────────────────────────────────────────────
  capture-mcp:
    build: ./services/capture-mcp
    container_name: stb-capture-mcp
    <<: [*restart, *logging]
    ports:
      - "${CAPTURE_MCP_PORT:-8001}:8000"
    environment:
      - REF_CAPTURE_DEVICE=${REF_CAPTURE_DEVICE:-/dev/video0}
      - DUT_CAPTURE_DEVICE=${DUT_CAPTURE_DEVICE:-/dev/video2}
      - CAPTURE_OUTPUT_DIR=/data/captures
      - BACKEND_MINIO_ENDPOINT=${BACKEND_MINIO_ENDPOINT}
      - BACKEND_MINIO_ACCESS_KEY=${BACKEND_MINIO_ACCESS_KEY}
      - BACKEND_MINIO_SECRET_KEY=${BACKEND_MINIO_SECRET_KEY}
    volumes:
      - ./data/captures:/data/captures
    # Linux/WSL2에서만 활성화. macOS Docker Desktop은 host-native 실행으로 대체.
    devices:
      - /dev/video0:/dev/video0   # Reference STB capture
      - /dev/video2:/dev/video2   # DUT capture (필요 시 추가)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 2) IR MCP — Global Caché iTach IP2IR 제어 (LAN)
  # ────────────────────────────────────────────────────────────
  ir-mcp:
    build: ./services/ir-mcp
    container_name: stb-ir-mcp
    <<: [*restart, *logging]
    ports:
      - "${IR_MCP_PORT:-8002}:8000"
    environment:
      - IR_BACKEND=${IR_BACKEND:-itach}
      - ITACH_HOST=${ITACH_HOST:-10.0.10.20}
      - ITACH_PORT=${ITACH_PORT:-4998}
      - BROADLINK_HOST=${BROADLINK_HOST:-192.168.1.50}
      - ADB_TARGET=${ADB_TARGET:-}
      - RDK_HOST=${RDK_HOST:-10.0.10.60}
      - RDK_PORT=${RDK_PORT:-9998}
      - RDK_TOKEN=${RDK_TOKEN:-}
      - IR_CODESET_DIR=/data/ir-codesets
    # ADB 네트워크 디바이스 접근을 위한 host network 옵션 (선택)
    # network_mode: host  # ADB 사용 시 활성화 권장 (Linux)
    volumes:
      # 학습 결과를 쓰기 위해 ro 제거 (이전에는 ro로 마운트되어 있었음)
      - ./data/ir-codesets:/data/ir-codesets
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 3) UART MCP — FTDI USB-Serial 로그 수집
  # ────────────────────────────────────────────────────────────
  uart-mcp:
    build: ./services/uart-mcp
    container_name: stb-uart-mcp
    <<: [*restart, *logging]
    ports:
      - "${UART_MCP_PORT:-8003}:8000"
    environment:
      - REF_UART_DEVICE=${REF_UART_DEVICE:-/dev/ttyUSB0}
      - DUT_UART_DEVICE=${DUT_UART_DEVICE:-/dev/ttyUSB1}
      - UART_BAUD=${UART_BAUD:-115200}
      - LOG_OUTPUT_DIR=/data/uart-logs
    volumes:
      - ./data/uart-logs:/data/uart-logs
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 4) Power MCP — Shelly Smart Plug 제어 (LAN)
  # ────────────────────────────────────────────────────────────
  power-mcp:
    build: ./services/power-mcp
    container_name: stb-power-mcp
    <<: [*restart, *logging]
    ports:
      - "${POWER_MCP_PORT:-8004}:8000"
    environment:
      - REF_PLUG_HOST=${REF_PLUG_HOST:-10.0.10.31}
      - DUT_PLUG_HOST=${DUT_PLUG_HOST:-10.0.10.32}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 5) Voice MCP — TTS 합성 + 스피커 재생 (음성 명령 시나리오)
  # ────────────────────────────────────────────────────────────
  voice-mcp:
    build: ./services/voice-mcp
    container_name: stb-voice-mcp
    <<: [*restart, *logging]
    ports:
      - "${VOICE_MCP_PORT:-8005}:8000"
    environment:
      - VOICE_OUTPUT_DIR=/data/voice
      - VOICE_RATE=${VOICE_RATE:-175}
      - VOICE_VOLUME=${VOICE_VOLUME:-1.0}
      - PLAYBACK_CMD=${PLAYBACK_CMD:-aplay}
    volumes:
      - ./data/voice:/data/voice
    # Linux: ALSA host audio passthrough. macOS는 호스트 네이티브 실행 권장.
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 6) Bluetooth MCP — BT 광고 스캔 + 디바이스 카탈로그 (페어링 보조)
  # ────────────────────────────────────────────────────────────
  bluetooth-mcp:
    build: ./services/bluetooth-mcp
    container_name: stb-bluetooth-mcp
    <<: [*restart, *logging]
    ports:
      - "${BLUETOOTH_MCP_PORT:-8006}:8000"
    environment:
      - BT_CATALOG_PATH=/data/bt-device-catalog.json
      - GPIO_PUSHER_URL=${GPIO_PUSHER_URL:-}
    volumes:
      - ./data/bt-device-catalog.json:/data/bt-device-catalog.json:ro
    # Linux 호스트 BT 스택 직접 접근. macOS는 호스트 네이티브 권장.
    # network_mode: host  # Linux에서 BT 어댑터 접근하려면 host 네트워크가 가장 안정적
    # 위 주석은 환경에 따라 활성화. PoC는 dbus 마운트로도 가능.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 7) Incident MCP — 임의 영상 free-form 오류 분석 (시나리오 무관)
  # ────────────────────────────────────────────────────────────
  incident-mcp:
    build:
      # tools/video_analyzer를 같이 복사해야 하므로 repo 루트가 context.
      context: ../..
      dockerfile: infrastructure/notebook-gateway/services/incident-mcp/Dockerfile
    container_name: stb-incident-mcp
    <<: [*restart, *logging]
    ports:
      - "${INCIDENT_MCP_PORT:-8007}:8000"
    environment:
      - INCIDENT_DATA_DIR=/data/analyses
      - EMBEDDING_MCP_URL=${EMBEDDING_MCP_URL:-}
    volumes:
      - ./data/analyses:/data/analyses
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # 8) Gateway Proxy — 모든 MCP 서비스를 단일 엔드포인트로 노출
  # ────────────────────────────────────────────────────────────
  gateway-proxy:
    image: caddy:2-alpine
    container_name: stb-gateway-proxy
    <<: [*restart, *logging]
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - capture-mcp
      - ir-mcp
      - uart-mcp
      - power-mcp
      - voice-mcp
      - bluetooth-mcp
      - incident-mcp

networks:
  default:
    name: stb-gateway-net
