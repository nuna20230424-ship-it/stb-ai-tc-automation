[pytest]
testpaths = scenarios
python_files = test_*.py
python_functions = test_*
addopts =
    -v
    --strict-markers
    --html=reports/report.html
    --self-contained-html
markers =
    e2e: end-to-end test requiring live MCP services
    slow: scenarios that take >30s
    channel_zap: 채널 Zap 시나리오
    voice: 음성 발화 응답 시나리오
    bluetooth: 블루투스 페어링/호환성 시나리오
