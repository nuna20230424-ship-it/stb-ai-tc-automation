[pytest]
testpaths = scenarios
python_files = test_*.py
python_functions = test_*
addopts =
    -v
    --strict-markers
    --html=reports/report.html
    --self-contained-html
markers =
    e2e: end-to-end test requiring live MCP services
    slow: scenarios that take >30s
    channel_zap: 채널 Zap 시나리오
    voice: 음성 발화 응답 시나리오
    bluetooth: 블루투스 페어링/호환성 시나리오
    preflight: Sprint 0 Stage 2 사전 검증 (하드웨어 없이 인프라/MCP 헬스+스모크)
    catalog: scenarios-catalog.json 기반 통합 시나리오
    epg: EPG (편성표) 시나리오
    ott: OTT 앱 시나리오 (Netflix/Tving/Wavve 등)
    drm: DRM 인증 시나리오 (Widevine/PlayReady/HDCP)
    trickplay: 재생 제어 시나리오 (FF/REW/Pause/Live Pause/Seek)
    preconditions: precondition 매크로 단위 smoke test
    search: 검색 시나리오 (음성/텍스트/필터/히스토리)
    recording: 녹화 시나리오 (예약/시리즈/재생/삭제)
    parental: 시청 제한 시나리오 (PIN/연령 등급/차단 채널)
    settings: 설정 시나리오 (언어/해상도/음향/네트워크)
    golden_set: 골든셋 ground truth 회귀 (Phase 2 임계 튜닝 안전망)
    anomaly: anomaly_injector 통합 (network/time/IR chaos, --anomaly-mode=dry-run|live)
